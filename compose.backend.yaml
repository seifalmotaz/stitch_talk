services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: stitchtalk
      MINIO_ROOT_PASSWORD: stitchtalk-dev-secret
      MINIO_API_CORS_ALLOW_ORIGIN: "https://stitch-talk.localhost"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - stitch-talk-minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "
      mc alias set local http://minio:9000 stitchtalk stitchtalk-dev-secret &&
      mc mb --ignore-existing local/stitch-talk-dev &&
      mc anonymous set none local/stitch-talk-dev
      "

volumes:
  stitch-talk-minio:
